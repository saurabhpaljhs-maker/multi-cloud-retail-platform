apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: retail
  template:
    metadata:
      labels:
        app: retail
    spec:
      containers:
      - name: retail
        image: yourusername/retail-app:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"